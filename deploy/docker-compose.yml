# Lives at /opt/drunk-robot-site/ on the VPS. Joins the existing Traefik
# network (root_default); Traefik handles TLS via Let's Encrypt. Mirrors the
# radicalwizard-site pattern used elsewhere on this server.
services:
  web:
    image: nginx:alpine
    container_name: drunk-robot-site
    restart: unless-stopped
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - root_default
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      - traefik.http.routers.drunkrobot.rule=Host(`drunk-robot.com`) || Host(`www.drunk-robot.com`)
      - traefik.http.routers.drunkrobot.entrypoints=websecure
      - traefik.http.routers.drunkrobot.tls=true
      - traefik.http.routers.drunkrobot.tls.certresolver=mytlschallenge
      - traefik.http.routers.drunkrobot.middlewares=dr-www@docker
      - traefik.http.middlewares.dr-www.redirectregex.regex=^https?://www\.drunk-robot\.com/(.*)
      - traefik.http.middlewares.dr-www.redirectregex.replacement=https://drunk-robot.com/$${1}
      - traefik.http.middlewares.dr-www.redirectregex.permanent=true
      - traefik.http.services.drunkrobot.loadbalancer.server.port=80

networks:
  root_default:
    external: true
