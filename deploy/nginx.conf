server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;
    # TLS terminates at Traefik and the site is served https-only, so pin it
    # for a year.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # The site is fully static and self-contained: no external fonts/scripts/
    # analytics, everything (comic images, the Anton webfont) is same-origin.
    # 'unsafe-inline' on script-src is needed for the Random-button's small
    # Astro is:inline script; there's no user-generated content anywhere on
    # this site, so the XSS surface that CSP normally guards against doesn't
    # exist here.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-src 'none';" always;

    # TLS terminates at Traefik and nginx is reached over http, so let nginx
    # emit relative redirect Locations to avoid an http->https extra hop.
    absolute_redirect off;

    # Astro fingerprints everything under /_astro/, safe to cache forever.
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        try_files $uri $uri/index.html =404;
    }
}
