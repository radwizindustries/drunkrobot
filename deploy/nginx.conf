server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;
    # TLS terminates at Traefik and the site is served https-only, so pin it
    # for a year.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # 'unsafe-inline' on script-src is needed for the Random-button's small
    # Astro is:inline script and the GA4 gtag bootstrap; 'unsafe-inline' on
    # style-src is needed because Astro inlines each page's CSS into a
    # <style> tag by default (not a linked stylesheet). There's no
    # user-generated content anywhere on this site, so the XSS surface CSP
    # normally guards against doesn't exist here.
    #
    # Google Analytics (gtag) and AdSense Auto Ads load scripts, make beacon/
    # fetch calls, and render ad creatives in iframes from several Google
    # domains. This is a real, accepted loosening of the policy in exchange
    # for analytics/monetization -- Auto Ads in particular is not fully
    # enumerable (Google's ad infrastructure spans many subdomains and can
    # add more over time). This list covers the documented/common set; if an
    # ad or analytics call is later blocked, the fix is adding the specific
    # domain a browser console CSP violation names, not loosening the policy
    # wholesale.
    #
    # The two "*."-prefixed entries (google-analytics.com, safeframe.
    # googlesyndication.com) are narrow, single-label subdomain wildcards
    # scoped to one Google-owned apex each (GA4's regional collect
    # endpoints; AdSense's SafeFrame sandboxing) -- not a bare `*`, and not
    # broad enough to cover unrelated Google products.
    #
    # img-src is the one directive that isn't a domain allowlist: ad
    # creative images come from arbitrary, unenumerable advertiser/CDN
    # origins, so it's scoped by scheme (`https:`) instead. This is
    # deliberately broader than the other directives -- accepted here
    # because it only affects what images can be requested, and the site
    # still has zero user-generated content for any of that to act on.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://www.google.com https://*.safeframe.googlesyndication.com; object-src 'none'; base-uri 'self';" always;

    # TLS terminates at Traefik and nginx is reached over http, so let nginx
    # emit relative redirect Locations to avoid an http->https extra hop.
    absolute_redirect off;

    # Astro fingerprints everything under /_astro/, safe to cache forever.
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # nginx's default mime.types maps .xml to text/xml, then the server-level
    # `charset utf-8` directive appends a charset param, serving
    # "text/xml; charset=utf-8". Google's sitemap docs say they accept that,
    # but a real submission got "Sitemap could not be read" -- forcing
    # application/xml (no charset) matches what every other observed-working
    # sitemap serves and removes this as a variable.
    #
    # default_type alone doesn't do this: it only applies when mime.types has
    # NO mapping for the extension, and .xml already has one (text/xml). The
    # `types {}` block here explicitly overrides that mapping for this
    # location, which is what actually takes effect.
    location = /sitemap.xml {
        types { application/xml xml; }
        default_type application/xml;
    }

    location / {
        try_files $uri $uri/index.html =404;
    }
}
