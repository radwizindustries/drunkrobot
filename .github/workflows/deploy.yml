name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Pin VPS host key
        run: |
          mkdir -p ~/.ssh
          echo "31.220.20.93 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINxCV9leBjiY+uKaAfHk/XAT7STtOpnVzPhULck7i6Y4" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over rsync/SSH
        run: rsync -az --delete dist/ ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:/opt/drunk-robot-site/dist/
